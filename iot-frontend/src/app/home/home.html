<div class="page-wrapper">
  <!-- Cool background effects matching your login screen -->
  <div class="noise-overlay"></div>
  <div class="grid-bg"></div>

  <!-- Top Right Profile Button -->
  <div class="profile-container">
    <div class="avatar-circle" (click)="goToProfile()" title="Go to Profile">
      @if (profilePicture) {
        <img [src]="profilePicture" alt="Profile" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;" />
      } @else {
        {{ initials }}
      }
    </div>
  </div>

  <!-- Center Content -->
  <div class="content-container">
    <h1 class="title">Welcome to IoT Monitor</h1>
    <p class="subtitle">Dashboard coming in Sprint 2</p>
  </div>
</div>
